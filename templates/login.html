<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precifica SC — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{color:#38bdf8;font-size:1.6rem;font-weight:700;letter-spacing:-0.5px}
.logo p{color:#64748b;font-size:.85rem;margin-top:4px}
label{display:block;color:#94a3b8;font-size:.8rem;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 14px;color:#e2e8f0;font-size:.95rem;margin-bottom:18px;outline:none;transition:border .2s}
input:focus{border-color:#38bdf8}
button{width:100%;background:#0ea5e9;border:none;border-radius:8px;padding:13px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
button:hover{background:#0284c7}
.erro{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Precifica SC</h1>
    <p>Sistema de Precificação — Allca</p>
  </div>
  {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
  <form method="POST">
    <label>E-mail</label>
    <input type="email" name="email" required autofocus placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" name="senha" required placeholder="••••••••">
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>

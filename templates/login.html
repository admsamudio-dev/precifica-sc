<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precifica SC — Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:14px;padding:2.5rem 2rem;width:100%;max-width:380px;border:1px solid #e2e8f0}
  .logo{text-align:center;margin-bottom:2rem}
  .logo-title{font-size:22px;font-weight:700;color:#1e40af;letter-spacing:-0.5px}
  .logo-sub{font-size:12px;color:#64748b;margin-top:3px}
  .badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;background:#dbeafe;color:#1e40af;margin-top:6px}
  label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:5px}
  input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;outline:none;transition:border .2s}
  input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
  .field{margin-bottom:1rem}
  .btn{width:100%;padding:11px;background:#1e40af;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:.5rem;transition:background .2s}
  .btn:hover{background:#1d4ed8}
  .err{color:#dc2626;font-size:12px;margin-top:.5rem;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-title">Precifica SC</div>
    <div class="logo-sub">Sistema de Precificação</div>
    <span class="badge">Santa Catarina · Lucro Presumido</span>
  </div>
  <div class="field">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autofocus>
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')entrar()">
  </div>
  <div class="err" id="err">E-mail ou senha incorretos.</div>
  <button class="btn" onclick="entrar()">Entrar</button>
</div>
<script>
async function entrar(){
  const email=document.getElementById('email').value;
  const senha=document.getElementById('senha').value;
  const err=document.getElementById('err');
  err.style.display='none';
  const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,senha})});
  if(res.ok){window.location='/';}
  else{err.style.display='block';}
}
</script>
</body>
</html>
